<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" role="img" aria-label="ResuLens Icon">
  <!-- Background square with rounded corners -->
  <rect width="48" height="48" rx="12" fill="#0891b2"/>

  <!-- Inner lens ring -->
  <circle cx="22" cy="22" r="14" stroke="white" stroke-width="2.2" fill="none"/>
  <circle cx="22" cy="22" r="8.5" stroke="white" stroke-width="1" fill="none" opacity="0.4"/>

  <!-- Document lines (resume) centered in lens -->
  <rect x="16.5" y="15" width="11" height="14" rx="1.5" fill="white" opacity="0.15"/>
  <rect x="16.5" y="15" width="11" height="14" rx="1.5" stroke="white" stroke-width="1.5"/>
  <!-- fold -->
  <path d="M24 15 L27.5 18.5 L24 18.5 Z" fill="white" opacity="0.6"/>
  <path d="M24 15 L27.5 18.5 L24 18.5" stroke="white" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- lines -->
  <line x1="18.5" y1="21" x2="24.5" y2="21" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="18.5" y1="24" x2="26" y2="24" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="18.5" y1="27" x2="23" y2="27" stroke="white" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Magnify handle -->
  <line x1="37" y1="37" x2="32" y2="32" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
</svg>
