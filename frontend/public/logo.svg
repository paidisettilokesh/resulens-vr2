<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none" role="img" aria-label="ResuLens Logo">
  <!-- ── LOGO MARK ── Lens aperture ring with centered document symbol -->
  <g transform="translate(0, 0)">
    <!-- Outer ring -->
    <circle cx="24" cy="24" r="21" stroke="#0891b2" stroke-width="2.5" fill="none"/>
    <!-- Inner ring -->
    <circle cx="24" cy="24" r="14" stroke="#0891b2" stroke-width="1.2" fill="none" opacity="0.35"/>
    <!-- Document icon (resume symbol) centered in lens -->
    <!-- Doc body -->
    <rect x="17.5" y="16" width="13" height="16" rx="1.5" fill="#0891b2" opacity="0.12"/>
    <rect x="17.5" y="16" width="13" height="16" rx="1.5" stroke="#0891b2" stroke-width="1.4"/>
    <!-- Fold corner -->
    <path d="M26.5 16 L30.5 20 L26.5 20 Z" fill="#0891b2" opacity="0.5"/>
    <path d="M26.5 16 L30.5 20 L26.5 20" stroke="#0891b2" stroke-width="1.2" stroke-linejoin="round"/>
    <!-- Document lines (resume content) -->
    <line x1="19.5" y1="22.5" x2="27" y2="22.5" stroke="#0891b2" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="19.5" y1="25.5" x2="28.5" y2="25.5" stroke="#0891b2" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="19.5" y1="28.5" x2="25.5" y2="28.5" stroke="#0891b2" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Magnify handle -->
    <line x1="38" y1="38" x2="33.5" y2="33.5" stroke="#0891b2" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- ── WORDMARK ── "ResuLens" in clean geometric type -->
  <text
    x="56"
    y="30"
    font-family="'Inter', 'Outfit', 'Helvetica Neue', Arial, sans-serif"
    font-size="18"
    font-weight="700"
    letter-spacing="-0.5"
    fill="#0f172a"
  >Resu<tspan fill="#0891b2">Lens</tspan></text>

  <!-- Tagline -->
  <text
    x="57"
    y="40"
    font-family="'Inter', 'Outfit', 'Helvetica Neue', Arial, sans-serif"
    font-size="7"
    font-weight="600"
    letter-spacing="1.8"
    fill="#94a3b8"
  >AI RESUME INTELLIGENCE</text>
</svg>
